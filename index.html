<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tríanss Storefront</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-gray-100">

<header class="bg-white shadow">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-gray-900">Tríanss Storefront</h1>
    </div>
</header>

<main class="container mx-auto mt-10">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Product Item -->
        <div class="bg-white p-5 rounded-lg shadow-md">
            <img src="/path/to/image.jpg" alt="Product Image" class="w-full h-48 object-cover rounded-t-lg">
            <h2 class="text-lg font-semibold mt-2">Product Name</h2>
            <p class="text-gray-600">Product description goes here.</p>
            <span class="block mt-2 text-xl font-bold">$19.99</span>
            <button class="mt-4 bg-blue-500 text-white py-2 px-4 rounded">Add to Cart</button>
        </div>
        <!-- Repeat for more products -->
    </div>
</main>

<footer class="bg-white mt-10 py-4 shadow">
    <div class="max-w-7xl mx-auto text-center">
        <p class="text-gray-500">&copy; 2026 Tríanss. All Rights Reserved.</p>
    </div>
</footer>

<script>
    $(document).ready(function() {
        // JavaScript functionality can go here
        console.log('Tríanss storefront loaded.');
    });
</script>

</body>
</html>
